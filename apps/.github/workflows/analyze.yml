name: Analyze

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.8.0

      - name: Install global dependencies
        working-directory: backends/global/top_attempt_global_server
        run: dart pub get

      - name: Analyze global
        working-directory: backends/global/top_attempt_global_server
        run: dart analyze --fatal-infos

      - name: Install local dependencies
        working-directory: backends/local/top_attempt_local_server
        run: dart pub get

      - name: Analyze local
        working-directory: backends/local/top_attempt_local_server
        run: dart analyze --fatal-infos
