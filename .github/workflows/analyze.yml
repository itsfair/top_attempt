name: Analyze

on:
  push:
    branches: [main]
    paths: ['apps/**', '.github/workflows/analyze.yml']
  pull_request:
    paths: ['apps/**', '.github/workflows/analyze.yml']

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.8.0

      - name: Install global dependencies
        working-directory: apps/backends/global/top_attempt_global_server
        run: dart pub get

      - name: Analyze global
        working-directory: apps/backends/global/top_attempt_global_server
        run: dart analyze --fatal-infos

      - name: Install local dependencies
        working-directory: apps/backends/local/top_attempt_local_server
        run: dart pub get

      - name: Analyze local
        working-directory: apps/backends/local/top_attempt_local_server
        run: dart analyze --fatal-infos
