name: Build & Release firmware

on:
  push:
    tags:
      - 'fw-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: doorinterface
    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Determine version
        id: ver
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#fw-v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "FW_VERSION_FLAGS=-DFW_VERSION=\\\"$VERSION\\\"" >> $GITHUB_ENV

      - name: Build
        run: pio run

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.ver.outputs.VERSION }}
          path: doorinterface/.pio/build/esp32dev/firmware.bin

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/fw-v')
        uses: softprops/action-gh-release@v2
        with:
          name: Firmware ${{ steps.ver.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: doorinterface/.pio/build/esp32dev/firmware.bin