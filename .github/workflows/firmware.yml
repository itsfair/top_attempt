name: Build firmware

on:
  push:
    branches: [main]
    paths:
      - 'doorinterface/**'
      - '.github/workflows/firmware.yml'
  pull_request:
    paths: ['doorinterface/**', '.github/workflows/firmware.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: doorinterface
    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Determine version
        id: ver
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: pio run -DFIRMWARE_VERSION="${{ steps.ver.outputs.VERSION }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.ver.outputs.VERSION }}
          path: doorinterface/.pio/build/esp32dev/firmware.bin
