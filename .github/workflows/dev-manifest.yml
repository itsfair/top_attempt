name: Update dev firmware manifest

on:
  push:
    branches: [main]
    paths: ['doorinterface/**', '.github/workflows/dev-manifest.yml']

permissions:
  contents: write

jobs:
  update-dev:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: doorinterface
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build
        id: build
        env:
          PLATFORMIO_BUILD_FLAGS: '-DFIRMWARE_VERSION="${{ github.sha::7 }}"'
        run: |
          VERSION=${GITHUB_SHA::7}
          pio run
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "SHA=$(sha256sum .pio/build/esp32dev/firmware.bin | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "SIZE=$(stat -c %s .pio/build/esp32dev/firmware.bin)" >> $GITHUB_OUTPUT

      - name: Write manifest
        run: |
          cat > firmware/manifest-dev.json <<EOF
          {
            "version": "${{ steps.build.outputs.VERSION }}",
            "url": "https://github.com/itsfair/top_attempt/releases/download/dev/firmware.bin",
            "sha256": "${{ steps.build.outputs.SHA }}",
            "size": ${{ steps.build.outputs.SIZE }},
            "notes": "Dev build from ${{ github.sha }}"
          }
          EOF

      - name: Create or update dev pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "Dev (latest main)"
          prerelease: true
          generate_release_notes: false
          body: |
            Latest dev build from `main`. Auto-updated on every push to
            `main` that touches `doorinterface/`. The binary and
            manifest are replaced in place on each run; this release is
            *not* a history of dev builds. Do not pin production
            devices to it.
          files: |
            doorinterface/.pio/build/esp32dev/firmware.bin
            doorinterface/firmware/manifest-dev.json

      - name: Commit manifest back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add doorinterface/firmware/manifest-dev.json
          git diff --staged --quiet || git commit -m "ci: dev manifest ${{ steps.build.outputs.VERSION }}"
          git push
