name: Format

on:
  push:
    branches: [main]
    paths: ['apps/**', '.github/workflows/format.yml']
  pull_request:
    paths: ['apps/**', '.github/workflows/format.yml']

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.8.0

      - name: Install global dependencies
        working-directory: apps/backends/global/top_attempt_global_server
        run: dart pub get

      - name: Check global formatting
        working-directory: apps/backends/global/top_attempt_global_server
        run: dart format --set-exit-if-changed .

      - name: Install local dependencies
        working-directory: apps/backends/local/top_attempt_local_server
        run: dart pub get

      - name: Check local formatting
        working-directory: apps/backends/local/top_attempt_local_server
        run: dart format --set-exit-if-changed .
