name: Publish firmware release

on:
  push:
    tags: ['v*']
    paths: ['doorinterface/**']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: doorinterface
    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Determine version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build
        run: pio run -DFIRMWARE_VERSION="${{ steps.ver.outputs.VERSION }}"

      - name: Compute SHA-256
        id: sha
        run: |
          echo "SHA=$(sha256sum .pio/build/esp32dev/firmware.bin | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "SIZE=$(stat -c %s .pio/build/esp32dev/firmware.bin)" >> $GITHUB_OUTPUT

      - name: Write manifest
        run: |
          cat > firmware/manifest-stable.json <<EOF
          {
            "version": "${{ steps.ver.outputs.VERSION }}",
            "url": "https://github.com/itsfair/top_attempt/releases/download/${{ github.ref_name }}/firmware.bin",
            "sha256": "${{ steps.sha.outputs.SHA }}",
            "size": ${{ steps.sha.outputs.SIZE }},
            "notes": "Release ${{ github.ref_name }}"
          }
          EOF

      - name: Create release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            doorinterface/.pio/build/esp32dev/firmware.bin
            doorinterface/firmware/manifest-stable.json
